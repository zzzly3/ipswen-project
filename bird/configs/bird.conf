router id 192.168.1.254;

debug protocols all;

log "bird.log" all;

protocol kernel {
    learn;
    scan time 10;
    ipv4 {
        import filter {
            if (net ~ [192.0.0.0/8+]) then accept;
            reject;
        };
        # export filter {
        #     if (net ~ [192.0.0.0/8+]) then accept;
        #     reject;
        # };
    };
}

